;//////////////////////////////////////////////////////////////////////////////

MappedImage ZuluCrateIcon
  Texture = ZuluCrate.tga
  TextureWidth = 64
  TextureHeight = 64
  Coords = Left:0 Top:0 Right:64 Bottom:64
End

MappedImage ZuluDerrickIcon
  Texture = ZuluDerrick.tga
  TextureWidth = 64
  TextureHeight = 64
  Coords = Left:0 Top:0 Right:64 Bottom:64
End
